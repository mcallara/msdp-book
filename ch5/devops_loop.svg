    <rect x="462" y="246" width="82" height="32" rx="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2" style="fill:rgb(225, 245, 238);stroke:rgb(29, 158, 117);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
