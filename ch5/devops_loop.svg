  <path d="M340,162 C322,96 248,52 175,58 C84,65 44,114 44,162 C44,210 84,259 175,266 C248,272 322,228 340,162 Z" fill="none" stroke="#AFA9EC" stroke-width="1.5" opacity="0.5" style="fill:none;stroke:rgb(175, 169, 236);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Right lobe outline -->
  <path d="M340,162 C358,96 432,52 505,58 C596,65 636,114 636,162 C636,210 596,259 505,266 C432,272 358,228 340,162 Z" fill="none" stroke="#5DCAA5" stroke-width="1.5" opacity="0.5" style="fill:none;stroke:rgb(93, 202, 165);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

